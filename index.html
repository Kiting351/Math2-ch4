<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulateur Mathématiques 2ème Sciences</title>
    
    <!-- Tailwind CSS pour le design -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel pour compiler le JSX directement dans le navigateur -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Petite animation pour l'apparition des contenus */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn {
            animation: fadeIn 0.3s ease-out forwards;
        }
    </style>
</head>
<body class="bg-slate-50">
    <!-- Le conteneur où React va s'injecter -->
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ICONES VECTORIELLES (Remplacement de Lucide-React pour le mode autonome) ---
        const Icon = ({ children, className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );
        const BookOpen = ({ className }) => <Icon className={className}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></Icon>;
        const Activity = ({ className }) => <Icon className={className}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></Icon>;
        const CheckCircle = ({ className }) => <Icon className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></Icon>;
        const AlertTriangle = ({ className }) => <Icon className={className}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></Icon>;
        const ArrowRight = ({ className }) => <Icon className={className}><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></Icon>;
        const Layers = ({ className }) => <Icon className={className}><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 12 12 17 22 12"/><polyline points="2 17 12 22 22 17"/></Icon>;
        const FileText = ({ className }) => <Icon className={className}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></Icon>;
        const ChevronDown = ({ className }) => <Icon className={className}><polyline points="6 9 12 15 18 9"/></Icon>;
        const ChevronUp = ({ className }) => <Icon className={className}><polyline points="18 15 12 9 6 15"/></Icon>;
        const Lightbulb = ({ className }) => <Icon className={className}><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></Icon>;

        // --- COMPOSANTS DE LABORATOIRE SPÉCIFIQUES ---

        const ParabolaLab = () => {
        const [a, setA] = useState(1);
        const [alpha, setAlpha] = useState(0);
        const [beta, setBeta] = useState(0);

        const generatePath = () => {
            let path = "";
            for (let x = -10; x <= 10; x += 0.1) {
            const y = a * Math.pow((x - alpha), 2) + beta;
            const svgX = (x * 15) + 150; 
            const svgY = 150 - (y * 15); 
            if (x === -10) path += `M ${svgX} ${svgY} `;
            else path += `L ${svgX} ${svgY} `;
            }
            return path;
        };

        return (
            <div className="bg-white p-4 sm:p-6 rounded-xl shadow-sm border border-gray-100 flex flex-col md:flex-row gap-6 md:gap-8">
            <div className="flex-1 space-y-4 sm:space-y-6">
                <h3 className="text-lg sm:text-xl font-bold text-gray-800 flex items-center mb-2 sm:mb-4">
                <Activity className="w-6 h-6 mr-2 text-blue-500 shrink-0" /> Laboratoire : Parabole
                </h3>
                <div className="bg-blue-50 p-3 sm:p-4 rounded-lg font-mono text-center text-lg sm:text-xl text-blue-900 mb-4 sm:mb-6 border border-blue-100 overflow-x-auto">
                f(x) = <span className="font-bold">{a}</span>(x - <span className="font-bold">{alpha}</span>)² + <span className="font-bold">{beta}</span>
                </div>
                <div className="space-y-4 sm:space-y-4">
                <div className="py-1">
                    <label className="flex justify-between text-sm font-medium text-gray-700 mb-2">
                    <span>Coefficient 'a' (Ouverture)</span><span className="font-bold">{a}</span>
                    </label>
                    <input type="range" min="-5" max="5" step="0.5" value={a} onChange={(e) => setA(parseFloat(e.target.value))} className="w-full h-3 sm:h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer" />
                </div>
                <div className="py-1">
                    <label className="flex justify-between text-sm font-medium text-gray-700 mb-2">
                    <span>'α' (Translation Horizontale)</span><span className="font-bold">{alpha}</span>
                    </label>
                    <input type="range" min="-8" max="8" step="1" value={alpha} onChange={(e) => setAlpha(parseFloat(e.target.value))} className="w-full h-3 sm:h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer" />
                </div>
                <div className="py-1">
                    <label className="flex justify-between text-sm font-medium text-gray-700 mb-2">
                    <span>'β' (Translation Verticale)</span><span className="font-bold">{beta}</span>
                    </label>
                    <input type="range" min="-8" max="8" step="1" value={beta} onChange={(e) => setBeta(parseFloat(e.target.value))} className="w-full h-3 sm:h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer" />
                </div>
                </div>
            </div>

            <div className="w-full max-w-[300px] aspect-square bg-slate-50 border-2 border-slate-200 rounded-lg relative overflow-hidden shrink-0 mx-auto">
                <svg viewBox="0 0 300 300" className="w-full h-full">
                {[...Array(21)].map((_, i) => (
                    <g key={i}>
                    <line x1={0} y1={i * 15} x2={300} y2={i * 15} stroke="#e2e8f0" strokeWidth={i === 10 ? 2 : 1} />
                    <line x1={i * 15} y1={0} x2={i * 15} y2={300} stroke="#e2e8f0" strokeWidth={i === 10 ? 2 : 1} />
                    </g>
                ))}
                <line x1={150} y1={0} x2={150} y2={300} stroke="#64748b" strokeWidth="2" />
                <line x1={0} y1={150} x2={300} y2={150} stroke="#64748b" strokeWidth="2" />
                
                {(alpha !== 0 || beta !== 0) && (
                    <line x1={150} y1={150} x2={150 + (alpha * 15)} y2={150 - (beta * 15)} stroke="#ef4444" strokeWidth="2" strokeDasharray="4" />
                )}
                <circle cx={150 + (alpha * 15)} cy={150 - (beta * 15)} r="4" fill="#ef4444" />
                <text x={150 + (alpha * 15) + 8} y={150 - (beta * 15) - 8} fill="#ef4444" className="text-xs font-bold">S</text>
                <path d={generatePath()} fill="none" stroke="#3b82f6" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" />
                </svg>
            </div>
            </div>
        );
        };

        const HyperbolaLab = () => {
        const [a, setA] = useState(2);
        const [alpha, setAlpha] = useState(0);
        const [beta, setBeta] = useState(0);

        const generatePath = () => {
            let d = "";
            let isFirstPoint = true;
            for (let x = -10; x <= 10; x += 0.1) {
            if (Math.abs(x - alpha) < 0.1) { isFirstPoint = true; continue; }
            const y = (a / (x - alpha)) + beta;
            const svgX = (x * 15) + 150;
            const svgY = 150 - (y * 15);
            
            if (svgY < -100 || svgY > 400) { isFirstPoint = true; continue; }
            if (isFirstPoint) { d += `M ${svgX} ${svgY} `; isFirstPoint = false; } 
            else { d += `L ${svgX} ${svgY} `; }
            }
            return d;
        };

        return (
            <div className="bg-white p-4 sm:p-6 rounded-xl shadow-sm border border-gray-100 flex flex-col md:flex-row gap-6 md:gap-8">
            <div className="flex-1 space-y-4 sm:space-y-6">
                <h3 className="text-lg sm:text-xl font-bold text-gray-800 flex items-center mb-2 sm:mb-4">
                <Activity className="w-6 h-6 mr-2 text-indigo-500 shrink-0" /> Laboratoire : Hyperbole
                </h3>
                <div className="bg-indigo-50 p-3 sm:p-4 rounded-lg font-mono text-center text-lg sm:text-xl text-indigo-900 mb-4 sm:mb-6 border border-indigo-100 flex items-center justify-center overflow-x-auto">
                f(x) =&nbsp;
                <div className="inline-flex flex-col items-center">
                    <span className="font-bold border-b-2 border-indigo-900 px-2">{a}</span>
                    <span>x - <span className="font-bold">{alpha}</span></span>
                </div>
                &nbsp;+ <span className="font-bold ml-1">{beta}</span>
                </div>
                <div className="space-y-4 sm:space-y-4">
                <div className="py-1">
                    <label className="flex justify-between text-sm font-medium text-gray-700 mb-2">
                    <span>Coefficient 'a' (Dilatation)</span><span className="font-bold">{a}</span>
                    </label>
                    <input type="range" min="-5" max="5" step="1" value={a} onChange={(e) => setA(parseFloat(e.target.value) || 1)} className="w-full h-3 sm:h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer" />
                </div>
                <div className="py-1">
                    <label className="flex justify-between text-sm font-medium text-gray-700 mb-2">
                    <span>'α' (Asymptote verticale x = α)</span><span className="font-bold">{alpha}</span>
                    </label>
                    <input type="range" min="-8" max="8" step="1" value={alpha} onChange={(e) => setAlpha(parseFloat(e.target.value))} className="w-full h-3 sm:h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer" />
                </div>
                <div className="py-1">
                    <label className="flex justify-between text-sm font-medium text-gray-700 mb-2">
                    <span>'β' (Asymptote horizontale y = β)</span><span className="font-bold">{beta}</span>
                    </label>
                    <input type="range" min="-8" max="8" step="1" value={beta} onChange={(e) => setBeta(parseFloat(e.target.value))} className="w-full h-3 sm:h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer" />
                </div>
                </div>
            </div>

            <div className="w-full max-w-[300px] aspect-square bg-slate-50 border-2 border-slate-200 rounded-lg relative overflow-hidden shrink-0 mx-auto">
                <svg viewBox="0 0 300 300" className="w-full h-full">
                {[...Array(21)].map((_, i) => (
                    <g key={i}>
                    <line x1={0} y1={i * 15} x2={300} y2={i * 15} stroke="#e2e8f0" strokeWidth={i === 10 ? 2 : 1} />
                    <line x1={i * 15} y1={0} x2={i * 15} y2={300} stroke="#e2e8f0" strokeWidth={i === 10 ? 2 : 1} />
                    </g>
                ))}
                <line x1={150} y1={0} x2={150} y2={300} stroke="#64748b" strokeWidth="2" />
                <line x1={0} y1={150} x2={300} y2={150} stroke="#64748b" strokeWidth="2" />
                
                <line x1={150 + (alpha * 15)} y1={0} x2={150 + (alpha * 15)} y2={300} stroke="#ef4444" strokeWidth="2" strokeDasharray="4" />
                <line x1={0} y1={150 - (beta * 15)} x2={300} y2={150 - (beta * 15)} stroke="#ef4444" strokeWidth="2" strokeDasharray="4" />
                <circle cx={150 + (alpha * 15)} cy={150 - (beta * 15)} r="4" fill="#ef4444" />
                <text x={150 + (alpha * 15) + 8} y={150 - (beta * 15) - 8} fill="#ef4444" className="text-xs font-bold">ω</text>
                <path d={generatePath()} fill="none" stroke="#6366f1" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" />
                </svg>
            </div>
            </div>
        );
        };

        const IntersectionLab = () => {
        const [k, setK] = useState(2);
        const f = (x) => Math.pow(x, 2) - 2;
        
        const generateParabola = () => {
            let path = "";
            for (let x = -10; x <= 10; x += 0.1) {
            const y = f(x);
            const svgX = (x * 15) + 150; 
            const svgY = 150 - (y * 15); 
            if (x === -10) path += `M ${svgX} ${svgY} `;
            else path += `L ${svgX} ${svgY} `;
            }
            return path;
        };

        const getIntersections = () => {
            const val = k + 2;
            if (val < 0) return [];
            if (val === 0) return [0];
            return [-Math.sqrt(val), Math.sqrt(val)];
        };

        const intersections = getIntersections();

        return (
            <div className="bg-white p-4 sm:p-6 rounded-xl shadow-sm border border-gray-100 flex flex-col md:flex-row gap-6 md:gap-8">
            <div className="flex-1 space-y-4 sm:space-y-6">
                <h3 className="text-lg sm:text-xl font-bold text-gray-800 flex items-center mb-2 sm:mb-4">
                <Activity className="w-6 h-6 mr-2 text-green-500 shrink-0" /> Résolution : f(x) = k
                </h3>
                <p className="text-sm sm:text-base text-gray-600 mb-4">
                Faites varier <strong>k</strong> pour déplacer la droite horizontale y = k et observer le nombre de solutions.
                </p>
                <div className="bg-green-50 p-3 sm:p-4 rounded-lg mb-4 sm:mb-6 border border-green-200 text-center">
                <div className="text-base sm:text-lg text-green-900 font-mono mb-2">f(x) = <span className="font-bold">{k}</span></div>
                <div className="font-bold text-sm sm:text-base text-green-700">
                    {intersections.length === 0 && "Aucune solution (S = ∅)"}
                    {intersections.length === 1 && `1 solution (x = 0)`}
                    {intersections.length === 2 && `2 solutions (x₁ ≈ ${intersections[0].toFixed(1)}, x₂ ≈ ${intersections[1].toFixed(1)})`}
                </div>
                </div>
                <div className="py-1">
                <label className="flex justify-between text-sm font-medium text-gray-700 mb-2">
                    <span>Valeur de k</span><span className="font-bold">{k}</span>
                </label>
                <input type="range" min="-5" max="5" step="1" value={k} onChange={(e) => setK(parseFloat(e.target.value))} className="w-full h-3 sm:h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer" />
                </div>
            </div>

            <div className="w-full max-w-[300px] aspect-square bg-slate-50 border-2 border-slate-200 rounded-lg relative overflow-hidden shrink-0 mx-auto">
                <svg viewBox="0 0 300 300" className="w-full h-full">
                {[...Array(21)].map((_, i) => (
                    <g key={i}>
                    <line x1={0} y1={i * 15} x2={300} y2={i * 15} stroke="#e2e8f0" strokeWidth={i === 10 ? 2 : 1} />
                    <line x1={i * 15} y1={0} x2={i * 15} y2={300} stroke="#e2e8f0" strokeWidth={i === 10 ? 2 : 1} />
                    </g>
                ))}
                <line x1={150} y1={0} x2={150} y2={300} stroke="#64748b" strokeWidth="2" />
                <line x1={0} y1={150} x2={300} y2={150} stroke="#64748b" strokeWidth="2" />
                <path d={generateParabola()} fill="none" stroke="#3b82f6" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" />
                <line x1={0} y1={150 - (k * 15)} x2={300} y2={150 - (k * 15)} stroke="#10b981" strokeWidth="3" />
                <text x={10} y={150 - (k * 15) - 8} fill="#10b981" className="text-sm font-bold">y = {k}</text>
                {intersections.map((x, idx) => (
                    <circle key={idx} cx={150 + (x * 15)} cy={150 - (k * 15)} r="5" fill="#10b981" stroke="#fff" strokeWidth="2" />
                ))}
                </svg>
            </div>
            </div>
        );
        };

        // --- COMPOSANT EXERCICES ---
        const ExerciseViewer = ({ exercises }) => {
        const [openIndex, setOpenIndex] = useState(null);

        return (
            <div className="space-y-4 sm:space-y-6">
            {exercises.map((exo, idx) => {
                const isOpen = openIndex === idx;
                return (
                <div key={idx} className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                    <div className={`p-4 sm:p-5 border-b-2 ${exo.type === 'Activité' ? 'border-orange-200 bg-orange-50' : 'border-blue-200 bg-blue-50'}`}>
                    <div className="flex flex-col sm:flex-row justify-between sm:items-center gap-2">
                        <h3 className={`font-bold text-base sm:text-lg ${exo.type === 'Activité' ? 'text-orange-800' : 'text-blue-800'}`}>
                        {exo.type} : {exo.title}
                        </h3>
                    </div>
                    <div className="mt-3 sm:mt-4 text-sm sm:text-base text-gray-800 leading-relaxed font-medium">
                        {exo.statement}
                    </div>
                    </div>
                    
                    <div className="p-3 sm:p-4 bg-gray-50 flex justify-between items-center cursor-pointer hover:bg-gray-100 transition-colors" onClick={() => setOpenIndex(isOpen ? null : idx)}>
                    <span className="font-semibold text-xs sm:text-sm text-gray-700 flex items-center">
                        <Lightbulb className="w-4 h-4 sm:w-5 sm:h-5 mr-2 text-yellow-500 shrink-0" />
                        Correction Pédagogique Détaillée & Astuces
                    </span>
                    {isOpen ? <ChevronUp className="w-4 h-4 sm:w-5 sm:h-5 text-gray-500 shrink-0"/> : <ChevronDown className="w-4 h-4 sm:w-5 sm:h-5 text-gray-500 shrink-0"/>}
                    </div>

                    {isOpen && (
                    <div className="p-4 sm:p-6 bg-white border-t border-gray-100 animate-fadeIn">
                        <div className="prose prose-sm sm:prose-base prose-blue max-w-none text-gray-700 space-y-3 sm:space-y-4">
                        {exo.correction}
                        </div>
                    </div>
                    )}
                </div>
                );
            })}
            </div>
        );
        };

        // --- DONNÉES PÉDAGOGIQUES COMPLÈTES (MODULES + EXERCICES PAGES 48-71) ---
        const MODULES = [
        {
            id: 'parabole',
            title: 'Les Paraboles (Forme Canonique)',
            component: ParabolaLab,
            summary: (
            <div className="space-y-4 text-gray-800">
                <h3 className="text-lg sm:text-xl font-bold text-blue-700">Fonction f(x) = a(x - α)² + β</h3>
                <p>La courbe représentative est une <strong>parabole</strong>.</p>
                <ul className="list-disc pl-5 space-y-2">
                <li><strong>Sommet :</strong> Le point S(α, β).</li>
                <li><strong>Axe de symétrie :</strong> La droite verticale d'équation x = α.</li>
                <li><strong>Orientation :</strong> a &gt; 0 (vers le haut), a &lt; 0 (vers le bas).</li>
                </ul>
            </div>
            ),
            quiz: [
            {
                question: "Quel est le sommet de la parabole définie par f(x) = 3(x - 4)² + 2 ?",
                options: ["S(-4, 2)", "S(4, 2)", "S(3, 2)", "S(4, -2)"],
                correct: 1,
                explanation: "La forme est a(x - α)² + β. Par identification : a=3, α=4, β=2. Le sommet est S(α, β) donc S(4, 2)."
            },
            {
                question: "La fonction g(x) = -2(x + 1)² - 5 admet :",
                options: ["Un minimum en -5", "Un maximum en -5", "Un minimum en 1", "Un maximum en -1"],
                correct: 1,
                explanation: "Ici a = -2 (négatif), la parabole est tournée vers le bas. Elle admet donc un point le plus haut : un maximum. Ce maximum est l'ordonnée du sommet (β), soit -5."
            },
            {
                question: "Comment déterminer rapidement l'ordonnée du point d'intersection de la parabole d'équation f(x) = 2(x - 3)² - 5 avec l'axe des ordonnées ?",
                options: ["C'est la valeur de β, soit -5", "C'est la valeur de α, soit 3", "Il faut calculer f(0) = 13", "Il faut résoudre f(x) = 0"],
                correct: 2,
                explanation: "Astuce classique : Tout point situé sur l'axe des ordonnées a pour abscisse x = 0. Il suffit de calculer l'image de 0 : f(0) = 2(0 - 3)² - 5 = 2(9) - 5 = 18 - 5 = 13."
            },
            {
                question: "Si une parabole a pour équation f(x) = x² - 6x + 8, quelle est l'équation de son axe de symétrie ?",
                options: ["x = -6", "x = 8", "x = 3", "y = 3"],
                correct: 2,
                explanation: "Astuce : L'abscisse du sommet (et donc l'axe de symétrie) se trouve avec la formule α = -b / (2a). Ici a=1 et b=-6. Donc α = -(-6) / (2*1) = 3. L'axe de symétrie est la droite verticale x = 3."
            },
            {
                question: "Une parabole admet un minimum et son sommet est S(2, -1). Que peut-on déduire de son équation f(x) = a(x - α)² + β ?",
                options: ["a > 0, α = 2, β = -1", "a < 0, α = 2, β = -1", "a > 0, α = -2, β = 1", "a < 0, α = -2, β = -1"],
                correct: 0,
                explanation: "Le mot 'minimum' signifie que la parabole est creuse (bras vers le haut), donc a > 0. Le sommet donne directement α = 2 et β = -1."
            }
            ],
            exercises: [
            {
                type: "Activité",
                title: "Passage à la forme canonique (Complétion du carré)",
                statement: (
                <div>
                    Soit la fonction définie sur ℝ par <strong>f(x) = x² - 6x + 5</strong>.<br/>
                    1. Montrer que f(x) peut s'écrire sous la forme f(x) = (x - 3)² - 4.<br/>
                    2. En déduire les coordonnées du sommet de la parabole représentant f.
                </div>
                ),
                correction: (
                <div>
                    <p className="font-bold text-blue-700 mb-2">Étape 1 : Astuce de la complétion du carré</p>
                    <p><strong>Pourquoi fait-on cela ?</strong> L'objectif est de forcer l'apparition d'une identité remarquable du type (a - b)² = a² - 2ab + b².</p>
                    <ul className="list-disc pl-5 mt-2 space-y-2">
                    <li>On regarde le début de l'expression : <strong>x² - 6x</strong>.</li>
                    <li>On sait que <strong>(x - 3)² = x² - 6x + 9</strong>.</li>
                    <li>Donc, par soustraction, on peut dire que : <strong>x² - 6x = (x - 3)² - 9</strong>.</li>
                    <li>On remplace cela dans l'expression initiale : <br/>
                        f(x) = [ (x - 3)² - 9 ] + 5
                    </li>
                    <li>On simplifie la fin : -9 + 5 = -4.</li>

                    <p>La parabole descend puis remonte. La droite la coupe en x=-1 et x=3. Entre ces deux points, le "ventre" de la parabole "pend" en dessous de la droite.</p>

                    <p className="font-bold text-green-700 mt-4 mb-2">Étape 2 : Lecture sur l'axe des abscisses (axe horizontal)</p>
                    <p>La zone où la parabole est sous la droite commence exactement en x = -1 et se termine exactement en x = 3. Comme le symbole est "≤" (inférieur OU égal), on inclut les bornes.</p>
                    
                    <p className="mt-4 bg-green-50 p-2 border-l-4 border-green-500 font-bold">
                    L'ensemble des solutions est l'intervalle S = [-1, 3].
                    </p>
                </div>
                )
            },
            {
                type: "Exercice",
                title: "Exploiter la Parité et la Symétrie",
                statement: (
                <div>
                    Une fonction f est définie sur l'intervalle [-4, 4]. On sait que f est <strong>impaire</strong>.<br/>
                    Le graphique montre que sur l'intervalle [0, 4], la fonction est croissante de f(0)=0 jusqu'à f(4)=5.<br/>
                    Déduire, sans tracer, le sens de variation de f sur [-4, 0] ainsi que la valeur de f(-4).
                </div>
                ),
                correction: (
                <div>
                    <p className="font-bold text-green-700 mb-2">Rappel de cours essentiel</p>
                    <p>Une fonction est <strong>impaire</strong> si pour tout x du domaine, f(-x) = -f(x).<br/>
                    Graphiquement, cela signifie que sa courbe admet <strong>l'origine du repère O(0,0) comme centre de symétrie</strong>.</p>

                    <p className="font-bold text-green-700 mt-4 mb-2">Calcul de f(-4)</p>
                    <p>Par définition : f(-4) = -f(4). Comme l'énoncé donne f(4) = 5, on déduit immédiatement :</p>
                    <div className="bg-gray-100 p-2 text-center rounded font-mono">f(-4) = -5</div>

                    <p className="font-bold text-green-700 mt-4 mb-2">Sens de variation (La règle d'or)</p>
                    <p><strong>Astuce :</strong> La symétrie centrale (fonction impaire) <em>conserve</em> le sens de variation. La symétrie axiale (fonction paire) <em>inverse</em> le sens de variation.</p>
                    <p>Puisque f est impaire et croissante sur les x positifs [0, 4], elle conserve ce comportement et sera également <strong>croissante</strong> sur les x négatifs [-4, 0].</p>
                    <p className="text-sm italic text-gray-600 mt-1">(Imaginez une courbe qui monte de gauche à droite, passant par zéro, elle continue de monter !)</p>
                </div>
                )
            }
            ]
        }
        ];

        // --- COMPOSANT QCM ---
        const Quiz = ({ questions }) => {
        const [currentQ, setCurrentQ] = useState(0);
        const [selectedOpt, setSelectedOpt] = useState(null);
        const [showExplanation, setShowExplanation] = useState(false);

        useEffect(() => { setCurrentQ(0); setSelectedOpt(null); setShowExplanation(false); }, [questions]);

        const handleSelect = (idx) => {
            if (showExplanation) return;
            setSelectedOpt(idx); setShowExplanation(true);
        };

        const nextQuestion = () => {
            setCurrentQ((prev) => (prev + 1) % questions.length);
            setSelectedOpt(null); setShowExplanation(false);
        };

        const q = questions[currentQ];
        const isCorrect = selectedOpt === q.correct;

        return (
            <div className="bg-white p-4 sm:p-6 rounded-xl shadow-sm border border-gray-100 max-w-2xl mx-auto">
            <div className="flex justify-between text-sm text-gray-500 mb-4">
                <span>Question {currentQ + 1} / {questions.length}</span>
            </div>
            <h3 className="text-lg sm:text-xl font-semibold text-gray-800 mb-4 sm:mb-6">{q.question}</h3>
            <div className="space-y-2 sm:space-y-3">
                {q.options.map((opt, idx) => {
                let bgClass = "bg-gray-50 border-gray-200 hover:bg-blue-50 cursor-pointer";
                if (showExplanation) {
                    if (idx === q.correct) bgClass = "bg-green-100 border-green-500 text-green-800 font-bold";
                    else if (idx === selectedOpt) bgClass = "bg-red-100 border-red-500 text-red-800 line-through";
                    else bgClass = "bg-gray-50 opacity-50 cursor-not-allowed";
                }
                return (
                    <div key={idx} onClick={() => handleSelect(idx)} className={`p-3 sm:p-4 rounded-lg border-2 transition-all ${bgClass} text-sm sm:text-base`}>
                    {opt}
                    </div>
                );
                })}
            </div>
            {showExplanation && (
                <div className={`mt-4 sm:mt-6 p-4 rounded-lg border-l-4 ${isCorrect ? 'bg-green-50 border-green-500' : 'bg-red-50 border-red-500'}`}>
                <h4 className="font-bold flex items-center mb-2 text-sm sm:text-base">
                    {isCorrect ? <CheckCircle className="w-5 h-5 mr-2 text-green-600 shrink-0"/> : <AlertTriangle className="w-5 h-5 mr-2 text-red-600 shrink-0"/>}
                    {isCorrect ? 'Excellente réponse !' : 'Oups, regardons cela ensemble.'}
                </h4>
                <p className="text-sm sm:text-base text-gray-700">{q.explanation}</p>
                <button onClick={nextQuestion} className="mt-4 flex items-center text-blue-600 font-medium hover:text-blue-800 text-sm sm:text-base">
                    Question suivante <ArrowRight className="w-4 h-4 ml-1 shrink-0"/>
                </button>
                </div>
            )}
            </div>
        );
        };

        // --- APP PRINCIPALE ---
        function App() {
        const [activeModuleId, setActiveModuleId] = useState(MODULES[0].id);
        const [activeTab, setActiveTab] = useState('labo');
        
        const currentModule = MODULES.find(m => m.id === activeModuleId);
        const LabComponent = currentModule.component;

        return (
            <div className="min-h-screen bg-slate-50 text-slate-900 font-sans">
            <header className="bg-blue-700 text-white shadow-md">
                <div className="max-w-5xl mx-auto px-4 py-4 sm:py-6">
                <h1 className="text-xl sm:text-2xl font-bold tracking-tight">Maths 2ème Sciences</h1>
                <p className="text-blue-200 mt-1 text-xs sm:text-sm md:text-base">Chapitre 4 : Fonctions de référence - Simulateur interactif</p>
                </div>
            </header>

            <main className="max-w-5xl mx-auto px-3 sm:px-4 py-6 sm:py-8">
                
                {/* Sélecteur de Module */}
                <div className="mb-6 sm:mb-8">
                <h2 className="text-xs sm:text-sm font-bold text-gray-500 uppercase tracking-wider mb-3 flex items-center">
                    <Layers className="w-4 h-4 mr-2 shrink-0" />
                    Choisir une notion :
                </h2>
                <div className="flex flex-col sm:flex-row flex-wrap gap-2">
                    {MODULES.map(m => (
                    <button 
                        key={m.id}
                        onClick={() => { setActiveModuleId(m.id); setActiveTab('labo'); }}
                        className={`w-full sm:w-auto justify-center px-4 py-3 sm:py-2 rounded-lg text-sm font-medium transition-all ${
                        activeModuleId === m.id 
                            ? 'bg-blue-600 text-white shadow-md' 
                            : 'bg-white text-gray-600 border border-gray-200 hover:bg-gray-50'
                        }`}
                    >
                        {m.title}
                    </button>
                    ))}
                </div>
                </div>

                {/* Navigation Interne */}
                <div className="flex flex-col sm:flex-row flex-wrap gap-2 mb-6 sm:mb-8 bg-white p-2 rounded-xl shadow-sm border border-gray-200 w-full sm:w-auto">
                <button 
                    onClick={() => setActiveTab('cours')}
                    className={`w-full sm:w-auto justify-center flex items-center px-4 py-3 sm:py-2 rounded-lg text-sm font-medium transition-colors ${activeTab === 'cours' ? 'bg-blue-100 text-blue-700' : 'text-gray-600 hover:bg-gray-50'}`}
                >
                    <BookOpen className="w-4 h-4 mr-2 shrink-0" /> Résumé
                </button>
                <button 
                    onClick={() => setActiveTab('labo')}
                    className={`w-full sm:w-auto justify-center flex items-center px-4 py-3 sm:py-2 rounded-lg text-sm font-medium transition-colors ${activeTab === 'labo' ? 'bg-blue-100 text-blue-700' : 'text-gray-600 hover:bg-gray-50'}`}
                >
                    <Activity className="w-4 h-4 mr-2 shrink-0" /> Laboratoire
                </button>
                <button 
                    onClick={() => setActiveTab('quiz')}
                    className={`w-full sm:w-auto justify-center flex items-center px-4 py-3 sm:py-2 rounded-lg text-sm font-medium transition-colors ${activeTab === 'quiz' ? 'bg-blue-100 text-blue-700' : 'text-gray-600 hover:bg-gray-50'}`}
                >
                    <CheckCircle className="w-4 h-4 mr-2 shrink-0" /> QCM Rapide
                </button>
                <button 
                    onClick={() => setActiveTab('exercices')}
                    className={`w-full sm:w-auto justify-center flex items-center px-4 py-3 sm:py-2 rounded-lg text-sm font-medium transition-colors ${activeTab === 'exercices' ? 'bg-orange-100 text-orange-800 border border-orange-200' : 'text-gray-600 hover:bg-gray-50'}`}
                >
                    <FileText className="w-4 h-4 mr-2 shrink-0" /> Exercices Corrigés
                </button>
                </div>

                {/* Contenu Actif */}
                <div className="transition-all duration-300">
                {activeTab === 'cours' && (
                    <div className="bg-white p-5 sm:p-8 rounded-xl shadow-sm border border-gray-100 max-w-3xl">
                    <h2 className="text-xl sm:text-2xl font-bold mb-4 sm:mb-6 border-b pb-2">{currentModule.title}</h2>
                    <div className="text-sm sm:text-base">
                        {currentModule.summary}
                    </div>
                    </div>
                )}

                {activeTab === 'labo' && (
                    <div className="animate-fadeIn">
                    <div className="mb-4 sm:mb-6 max-w-3xl">
                        <h2 className="text-xl sm:text-2xl font-bold mb-2">Comprendre et manipuler</h2>
                        <p className="text-sm sm:text-base text-gray-600">Modifiez les paramètres pour observer les changements géométriques en temps réel.</p>
                    </div>
                    <LabComponent />
                    </div>
                )}

                {activeTab === 'quiz' && (
                    <div className="animate-fadeIn">
                    <div className="mb-4 sm:mb-6 max-w-2xl mx-auto text-center">
                        <h2 className="text-xl sm:text-2xl font-bold mb-2">Vérification des acquis</h2>
                        <p className="text-sm sm:text-base text-gray-600">Appliquez les astuces vues en cours. Une explication s'affichera à chaque réponse.</p>
                    </div>
                    <Quiz questions={currentModule.quiz} />
                    </div>
                )}

                {activeTab === 'exercices' && (
                    <div className="animate-fadeIn max-w-3xl">
                    <div className="mb-4 sm:mb-6">
                        <h2 className="text-xl sm:text-2xl font-bold mb-2 flex items-center text-orange-800">
                        <FileText className="w-5 h-5 sm:w-6 sm:h-6 mr-2 shrink-0" /> Exercices Types du Programme
                        </h2>
                        <p className="text-sm sm:text-base text-gray-600">
                        Découvrez la correction détaillée, pas à pas, des exercices et activités incontournables du chapitre. Cliquez sur "Correction Pédagogique Détaillée" pour comprendre la méthode.
                        </p>
                    </div>
                    <ExerciseViewer exercises={currentModule.exercises} />
                    </div>
                )}
                </div>

            </main>
            </div>
        );
        }

        // Lancement de l'application
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
